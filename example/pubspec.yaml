name: example
description: "An example for Colaxy packages."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  app_info_tile: ^0.1.0+2
  app_lang_selector: ^0.1.0+2
  app_theme_picker: ^0.1.3+2
  colaxy_adaptive_scaffold: ^0.0.1+3
  colaxy_screenshot: ^0.6.0+1
  riverpod_helper: ^0.1.0+1
  cupertino_icons: ^1.0.8
  easy_localization: ^3.0.8
  riverpod_annotation: ^3.0.3
  flutter_riverpod: ^3.0.3
  colaxy_tutorial: ^0.2.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  riverpod_generator: ^3.0.3
  build_runner: ^2.7.2
  custom_lint: ^0.8.1
  riverpod_lint: ^3.0.3
  colaxy_icons_launcher: ^0.1.0+1

colaxy_icons_launcher:
  image_path: 'assets/icon.svg'
  platforms:
    android:
      enable: true
    ios:
      enable: true
    web:
      enable: true
    macos:
      enable: true
    windows:
      enable: true
    linux:
      enable: true

flutter:
  uses-material-design: true
resolution: workspace